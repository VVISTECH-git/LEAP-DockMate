# FIX: Reduced JVM heap from -Xmx8G to -Xmx4G and MaxMetaspaceSize from 4G to 2G.
# The original settings required 12GB+ RAM which crashes builds on standard machines and CI/CD agents.
# -Xmx4G is more than sufficient for any Flutter app build.
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
